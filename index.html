<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Lean</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ddd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            margin: 20px 0;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #008; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: background 0.3s; 
        }
        button:hover { background-color: #005; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-links { 
            margin-top: 20px; 
            font-size: 14px; 
            color: #666; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .footer-links a { 
            color: #008; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Inscription</h1>
    <p>Créez votre compte Lean</p>
    
    <form id="registerForm">
        <div class="input-group">
            <label for="nom">Nom d'utilisateur</label>
            <input type="text" id="nom" placeholder="Votre nom complet" required>
        </div>
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="input-group">
            <label for="pin">Code PIN (4 chiffres)</label>
            <input type="password" id="pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" required>
        </div>
        <div class="input-group">
            <label for="confirmPin">Confirmer le PIN</label>
            <input type="password" id="confirmPin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" required>
        </div>

        <button type="submit" id="btnSInscrire">S'inscrire</button>
    </form>

    <div class="footer-links">


2        <div>Déjà un compte ? <a href="login.html">Se connecter ici</a></div>
        <div><a href="login.html"></a></div>
    </div>
</div>

<script>
    const form = document.getElementById('registerForm');
    const btn = document.getElementById('btnSInscrire');
    
    // Utilisation d'un chemin relatif pour éviter les erreurs de domaine (CORS/Timeout)
    const API_ENDPOINT = "/api/inscription";

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        const nom = document.getElementById('nom').value.trim();
        const email = document.getElementById('email').value.trim();
        const pin = document.getElementById('pin').value.trim();
        const confirmPin = document.getElementById('confirmPin').value.trim();

        if (pin !== confirmPin) {
            alert("Les codes PIN ne correspondent pas.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Création...";

        try {
            // Appel au serveur via le chemin relatif
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, email, pin })
            });

            // Vérifie si le serveur a répondu (code 200-299)
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || "Erreur serveur");
            }

            const data = await response.json();

            if (data.success) {
                // Stockage des infos pour le Dashboard
                if (data.user) {
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.nom);
                } else {
                    // Si le serveur ne renvoie pas l'user direct, on stocke l'email pour le login
                    localStorage.setItem('userEmail', email);
                }
                
                alert("Compte créé avec succès !");
                window.location.href = 'dashboard.html';
            } else {
                alert("Erreur : " + data.message);
                resetButton();
            }
        } catch (error) {
            console.error("Erreur détaillée:", error);
            alert("Le serveur ne répond pas. Vérifiez que l'instance Render est active ou réessayez dans 30 secondes.");
            resetButton();
        }
    };

    function resetButton() {
        btn.disabled = false;
        btn.innerText = "S'inscrire";
    }
</script>

</body>
</html>
