<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Lean</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ddd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #008; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: background 0.3s; 
        }
        button:hover { background-color: #005; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-link { margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #008; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Connexion</h1>
    <p>Heureux de vous revoir !</p>
    
    <form id="loginForm">
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="input-group">
            <label for="pin">Code PIN (4 chiffres)</label>
            <input type="password" id="pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" required>
        </div>

        <button type="submit" id="btnConnecter">Se connecter</button>
    </form>

    <div class="footer-link">
        Nouveau ici ? <a href="inscription.html">Créer un compte</a>
    </div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnConnecter');

    // Utilisation de l'URL correcte (URL Render de votre projet Lean)
    const API_URL = "https://lean3.onrender.com/index.html";

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerText = "Connexion...";

        const emailSaisi = document.getElementById('email').value.trim();
        const pinSaisi = document.getElementById('pin').value.trim();

        try {
            const response = await fetch(`${API_URL}/api/connexion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailSaisi, pin: pinSaisi })
            });

            const data = await response.json();

            if (data.success) {
                // On stocke les informations pour la session
                if (data.user) {
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userName', data.user.nom);
                }
                
                // Redirection vers le dashboard
                window.location.href = 'dashboard.html'; 
            } else {
                alert("Erreur : " + (data.message || "Email ou PIN incorrect"));
                resetButton();
            }
        } catch (error) {
            console.error("Erreur de connexion:", error);
            alert("Le serveur ne répond pas. Vérifiez que votre service Render est bien actif.");
            resetButton();
        }
    };

    function resetButton() {
        btn.disabled = false;
        btn.innerText = "Se connecter";
    }
</script>
</body>
</html>
