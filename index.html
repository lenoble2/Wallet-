<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Lean</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ddd; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            margin: 20px 0;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #444; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #008; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: background 0.3s; 
        }
        button:hover { background-color: #005; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-links { 
            margin-top: 20px; 
            font-size: 14px; 
            color: #666; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .footer-links a { 
            color: #008; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Inscription</h1>
    <p>Créez votre compte Lean</p>
    
    <form id="registerForm">
        <div class="input-group">
            <label for="nom">Nom d'utilisateur</label>
            <input type="text" id="nom" placeholder="Votre nom complet" required>
        </div>
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="input-group">
            <label for="pin">Code PIN (4 chiffres)</label>
            <input type="password" id="pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" required>
        </div>
        <div class="input-group">
            <label for="confirmPin">Confirmer le PIN</label>
            <input type="password" id="confirmPin" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" required>
        </div>

        <button type="submit" id="btnSInscrire">S'inscrire</button>
    </form>

    <div class="footer-links">
        <div>Déjà un compte ? <a href="login.html">Se connecter ici</a></div>
        <div><a href="login.html"></a></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const displayID = document.getElementById('displayID');
    const displaySolde = document.getElementById('displaySolde');

    // 1. Lecture de l'ID stocké
    const savedId = localStorage.getItem('userId');

    // DIAGNOSTIC : Si l'ID est vide, on affiche une alerte pour comprendre
    if (!savedId) {
        console.error("Aucun ID trouvé dans localStorage");
        displayID.innerText = "Non connecté";
        // Optionnel : rediriger vers login si vide
        // window.location.href = 'login.html';
        return;
    }

    // 2. Affichage immédiat du format 08000 + ID
    // On force la conversion en texte pour éviter les erreurs
    displayID.innerText = "08000" + savedId.toString();

    // 3. Récupération du solde sur le serveur
    try {
        const API_URL = "https://lean3.onrender.com";
        const response = await fetch(${API_URL}/api/user/${savedId});
        const data = await response.json();

        if (data.success && data.user) {
            displaySolde.innerText = parseFloat(data.user.solde).toLocaleString('fr-FR');
        }
    } catch (error) {
        console.error("Erreur récupération solde:", error);
    }
});
</script>

</script>
</body>
</html>
