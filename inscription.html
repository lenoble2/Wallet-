
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Lean Wallet</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inscription</h1>
        <p style="text-align:center; color: #666;">Créez votre compte Lean</p>
        <form id="form-inscription">
            <label>Nom d'utilisateur</label>
            <input type="text" id="nom" placeholder="Votre nom complet" required>
            
            <label>E-mail</label>
            <input type="email" id="email" placeholder="votre@email.com" required>
            
            <label>Code PIN (4 chiffres)</label>
            <input type="password" id="pin" maxlength="4" placeholder="****" required>
            
            <label>Confirmer le PIN</label>
            <input type="password" id="confirm-pin" maxlength="4" placeholder="****" required>
            
            <button type="submit">S'inscrire</button>
        </form>
    </div>

    <script>
        document.getElementById('form-inscription').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const pin = document.getElementById('pin').value;
            const confirmPin = document.getElementById('confirm-pin').value;

            // Vérification locale du PIN
            if (pin !== confirmPin) {
                alert("Les codes PIN ne correspondent pas !");
                return;
            }

            try {
                const response = await fetch('/api/inscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, email, pin })
                });

                const data = await response.json();

                if (data.success) {
                    // 1. On sauvegarde l'utilisateur (avec son ID généré) dans le navigateur
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // 2. Alerte de succès
                    alert("Compte créé avec succès ! Bienvenue " + data.user.nom);
                    
                    // 3. REDIRECTION FORCÉE
                    window.location.replace('dashboard.html');
                } else {
                    alert("Erreur : " + (data.error || "Impossible de s'inscrire"));
                }
            } catch (error) {
                console.error("Erreur réseau :", error);
                alert("Le serveur ne répond pas. Vérifiez que Termux est bien lancé.");
            }
        });
    </script>

</body>
</html>
