<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<style>
.icon-container svg {
    width: 28px; /* Taille de l'icône */
    height: 28px;
    display: block;
}
</style>
<body>
<div class="history-section admin-panel">
    <div class="history-title">Membres inscrits (Base de données)</div>
    <div class="users-table-container">
        <table class="lean-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Solde</th>
                </tr>
            </thead>
            <tbody id="liste-membres-db">
                <tr class="user-row">
                    <td colspan="4" style="text-align:center; padding:20px; color:gray;">
                        Chargement des utilisateurs...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

    
<style>
/* --- STYLE DU TABLEAU DES MEMBRES --- */
.users-table-container {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    overflow-x: auto; /* Défilement horizontal sur petit écran */
    margin-bottom: 50px;
}

.lean-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.lean-table th {
    background-color: #f8f9fa;
    color: #7f8c8d;
    text-align: left;
    padding: 12px;
    border-bottom: 2px solid #eee;
    font-size: 11px;
    text-transform: uppercase;
}

.lean-table td {
    padding: 12px;
    border-bottom: 1px solid #f9f9f9;
    color: #333;
}

.user-row:hover {
    background-color: #fcfcfc;
}

.text-id { font-weight: bold; color: #95a5a6; }
.text-name { font-weight: bold; color: #2c3e50; }
.text-solde { color: #008; font-weight: bold; } /* Bleu Lean */

</style>
<script>
    async function chargerMembresDB() {
    const tableBody = document.getElementById('liste-membres-db');
    try {
        // Remplace par ton endpoint qui fait "SELECT * FROM utilisateurs"
        const response = await fetch(${SERVER_URL}/utilisateurs); 
        const data = await response.json();

        if (data.success && data.users.length > 0) {
            tableBody.innerHTML = ""; 
            data.users.forEach(user => {
                tableBody.innerHTML += 
                    <tr class="user-row">
                        <td class="text-id">${user.id}</td>
                        <td class="text-name">${user.nom}</td>
                        <td><small>${user.email}</small></td>
                        <td class="text-solde">${parseFloat(user.solde).toLocaleString()} <small>XOF</small></td>
                    </tr>
                ;
            });
        }
    } catch (error) {
        tableBody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>Erreur de connexion serveur</td></tr>";
    }
}

// Ajoute l'appel à la fonction au chargement de la page
window.onload = () => {
    chargerDonnees();
    chargerMembresDB();
};

</script>

</body>

</html>
