<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membres LeanDB</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; text-align: center; }
        .header { background-color: #000080; color: white; padding: 20px; font-size: 22px; font-weight: bold; }
        .container { padding: 20px; display: flex; justify-content: center; }
        table { width: 100%; max-width: 500px; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 12px; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; text-align: left; }
        .solde { font-weight: bold; color: #000080; }
    </style>
</head>
<body>

<div class="header">Membres LeanDB</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>NOM</th>
                <th>SOLDE</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td colspan="3" style="text-align:center; padding: 20px;">Chargement du Coffre Fort...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
async function chargerMembres() {
    const tbody = document.getElementById('table-body');
    try {
        // 1. Appel de ta route admin
        const response = await fetch('/api/admin/utilisateurs');
        const utilisateurs = await response.json(); // C'est un tableau

        if (utilisateurs && utilisateurs.length > 0) {
            tbody.innerHTML = ""; // On efface le message "Chargement..."

            utilisateurs.forEach(user => {
                const row = document.createElement('tr');
                
                // Formatage du solde (ex: 10 000 000.00 XOF)
                const soldeClean = parseFloat(user.solde).toLocaleString('fr-FR', {
                    minimumFractionDigits: 2
                }) + " XOF";

                row.innerHTML = 
                    <td>08000${user.id}</td>
                    <td><strong>${user.nom}</strong></td>
                    <td style="color: #000080; font-weight: bold;">${soldeClean}</td>
                ;
                tbody.appendChild(row);
            });
        } else {
            tbody.innerHTML = "<tr><td colspan='3'>Aucun membre trouvé.</td></tr>";
        }
    } catch (error) {
        console.error("Erreur:", error);
        tbody.innerHTML = "<tr><td colspan='3'>Erreur de connexion au serveur local.</td></tr>";
    }
}

</script>
</body>
</html>
