<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Lean Wallet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-refresh { 
            background-color: #3498db; color: white; border: none; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-refresh:hover { background-color: #2980b9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        
        .status-msg { text-align: center; color: #7f8c8d; margin: 20px; font-style: italic; }
        .error-msg { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestion des Utilisateurs</h1>
    
    <div class="controls">
        <button class="btn-refresh" onclick="fetchData()">🔄 Forcer l'affichage (Aiven Server)</button>
    </div>

    <div id="status" class="status-msg">En attente du serveur...</div>

    <table id="adminTable" style="display:none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Solde</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    async function fetchData() {
        const statusDiv = document.getElementById('status');
        const table = document.getElementById('adminTable');
        const tableBody = document.getElementById('tableBody');

        statusDiv.innerHTML = "Connexion au serveur Render & Aiven en cours...";
        statusDiv.className = "status-msg";
        table.style.display = "none";

        try {
            // On ajoute un paramètre 't' pour éviter que le navigateur utilise le cache
            const response = await fetch(https://lean3.onrender.com/api/admin/utilisateurs?t=${Date.now()});
            
            if (!response.ok) throw new Error(Erreur Serveur: ${response.status});

            const data = await response.json();
            tableBody.innerHTML = "";

            data.forEach(user => {
                tableBody.innerHTML += 
                    <tr>
                        <td>#${user.id}</td>
                        <td><strong>${user.nom}</strong></td>
                        <td>${parseFloat(user.solde).toLocaleString('fr-FR')} CFA</td>
                    </tr>;
            });

            statusDiv.style.display = "none";
            table.style.display = "table";

        } catch (error) {
            statusDiv.innerHTML = <span class="error-msg">❌ Erreur : ${error.message}<br>Vérifiez que le serveur est bien démarré sur Render.</span>;
            console.error("Détails de l'erreur:", error);
        }
    }

    // Charger au démarrage
    window.onload = fetchData;
</script>
</body>
</html>
