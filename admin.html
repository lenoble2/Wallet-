<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lean Wallet</title>
    <style>
        /* Style identique à ton dashboard */
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .header { background: #000080; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .history-section { padding: 15px; max-width: 500px; margin: auto; }
        
        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid #000080;
        }
        .trans-info { display: flex; flex-direction: column; }
        .trans-name { font-weight: bold; color: #2c3e50; font-size: 15px; }
        .trans-email { font-size: 11px; color: #95a5a6; margin-top: 2px; }
        .trans-amount { font-weight: bold; color: #000080; font-size: 15px; }
    </style>
</head>
<body>

<div class="header">Gestion des Membres Lean</div>

<div class="history-section">
    <div id="liste-membres">
        <p style="text-align:center; color: gray;">Chargement de la base de données...</p>
    </div>
</div>

<script>
    // Ton lien direct qui fonctionne
    const API_URL = "https://lean3.onrender.com/api/admin/utilisateurs";

    async function chargerMembres() {
        const container = document.getElementById('liste-membres');
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // On vérifie si c'est un tableau direct ou un objet avec une propriété 'users'
            const membres = Array.isArray(data) ? data : (data.users || []);

            if (membres.length > 0) {
                container.innerHTML = ""; // On efface le message de chargement

                membres.forEach(user => {
                    // Création du visuel identique à ton dashboard
                    container.innerHTML += 
                        <div class="transaction-item">
                            <div class="trans-info">
                                <span class="trans-name">${user.nom}</span>
                                <span class="trans-email">${user.email}</span>
                            </div>
                            <div class="trans-amount">
                                ${parseFloat(user.solde).toLocaleString('fr-FR')} XOF
                            </div>
                        </div>
                    ;
                });
            } else {
                container.innerHTML = "<p style='text-align:center;'>Aucun utilisateur trouvé.</p>";
            }
        } catch (error) {
            console.error("Erreur:", error);
            container.innerHTML = "<p style='text-align:center; color:red;'>Erreur de connexion à l'API Render.</p>";
        }
    }

    // Exécution automatique
    window.onload = chargerMembres;
</script>

</body>
</html>
