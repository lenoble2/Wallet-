            width: 33.33%; 
            height: 100%;
            object-fit: cover;
        }

        @keyframes slide {
            0% { transform: translateX(0%); }
            30% { transform: translateX(0%); }
            33% { transform: translateX(-33.33%); }
            63% { transform: translateX(-33.33%); }
            66% { transform: translateX(-66.66%); }
            96% { transform: translateX(-66.66%); }
            100% { transform: translateX(0%); }
        }

<script>
    const API_BASE = "/api";

    // Fonction pour formater l'ID avec le préfixe 08000
    function formaterID(id) {
        if (!id) return "--";
        // Retourne 08000 suivi de l'ID (ex: 1 devient 080001)
        return "08000" + id;
    }

async function chargerDonnees() {
    const userId = localStorage.getItem('userId'); 
    
    if (userId) {
        // Affichage de l'ID formaté (ex: 0800028)
        const idFormate = "08000" + userId;
        document.getElementById('user-id-display').textContent = "ID: " + idFormate;
        
        // Mise à jour du QR code
        const qrImg = document.getElementById('qr-image');
        if(qrImg) qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=LEAN-${idFormate}`;
    }

    if (!userId || userId === "undefined") return;

    try {
        // Récupération des données réelles depuis ton serveur Render
        const response = await fetch(`/api/utilisateur/${userId}`);
        const data = await response.json();

        if (data.success && data.user) {
            // Affichage du solde agrandi
            const montant = parseFloat(data.user.solde) || 0;
            document.getElementById('solde').textContent = montant.toLocaleString('fr-FR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
    } catch (error) {
        console.error("Erreur serveur");
        document.getElementById('solde').textContent = "---";
    }

    chargerHistorique(userId);
}

    async function chargerHistorique(userId) {
        const container = document.getElementById('liste-transactions');
        try {
            const response = await fetch(`${API_BASE}/historique/${userId}`);
            const data = await response.json();

            if (data.success && data.transactions && data.transactions.length > 0) {
                container.innerHTML = ""; 
                data.transactions.forEach(t => {
                    const isOut = t.expediteur_id == userId;
                    const couleur = isOut ? "#e74c3c" : "#2ecc71";
                    const signe = isOut ? "-" : "+";
                    const nomAffiche = isOut ? "Vers: " + t.destinataire : "De: " + t.expediteur;
                    
                    container.innerHTML += `
                        <div class="transaction-item">
                            <div class="trans-info">
                                <span class="trans-name">${nomAffiche}</span>
                                <span class="trans-date">${new Date(t.date).toLocaleDateString()}</span>
                            </div>
                            <div class="trans-amount" style="color: ${couleur};">
                                ${signe}${t.montant} XOF
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p style='text-align:center; padding:20px; font-size:12px; color:gray;'>Aucune activité.</p>";
            }
        } catch (error) {
            container.innerHTML = "<p style='text-align:center; padding:20px; font-size:12px; color:gray;'>Historique indisponible.</p>";
        }
    }

    window.onload = chargerDonnees;
</script>
