    <style>
        /* --- AJUSTEMENTS LOCAUX --- */
        .solde-container {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-top: 5px;
        }

        /* --- STYLE DE LA BANNIÈRE DYNAMIQUE (SLIDER) --- */
        .mission-banner {
            position: relative;
            overflow: hidden;
            padding: 0 !important;
            height: 120px;
            border-radius: 12px;
            margin: 20px; /* Ajout d'une marge pour l'aérer */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .slider-container {
            display: flex;
            width: 300%; /* 3 images = 300% */
            height: 100%;
            animation: slide 12s infinite ease-in-out;
        }

        .slider-container img {
            width: 33.33%; 
            height: 100%;
            object-fit: cover;
        }

        @keyframes slide {
            0% { transform: translateX(0%); }
            30% { transform: translateX(0%); }
            33% { transform: translateX(-33.33%); }
            63% { transform: translateX(-33.33%); }
            66% { transform: translateX(-66.66%); }
            96% { transform: translateX(-66.66%); }
            100% { transform: translateX(0%); }
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            padding: 15px;
            pointer-events: none;
        }

        /* --- STYLE DE L'HISTORIQUE --- */
        .history-section {
            margin: 10px 20px;
        }

        .history-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        #liste-transactions {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 5px;
            margin-bottom: 30px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f9f9f9;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .trans-info {
            display: flex;
            flex-direction: column;
        }

        .trans-name {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
        }

        .trans-date {
            font-size: 11px;
            color: #95a5a6;
        }

        .trans-amount {
            font-weight: bold;
            font-size: 14px;
        }
    </style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const displayID = document.getElementById('displayID');
    const displaySolde = document.getElementById('displaySolde');
    const displayUserName = document.getElementById('displayUserName');

    // 1. Récupération
    const userId = localStorage.getItem('userId');
    const userName = localStorage.getItem('userName');

    console.log("ID récupéré :", userId); // Debug dans la console Termux/Chrome

    // 2. Affichage de l'ID (Format 08000 + ID)
    if (userId && userId !== "undefined") {
        displayID.innerText = "08000" + userId;
        if(userName) displayUserName.innerText = userName;
        
        // 3. Appel au serveur pour le solde
        recupererSolde(userId);
    } else {
        displayID.innerText = "Non détecté";
        console.error("Erreur : Aucun userId dans le localStorage. Connectez-vous d'abord.");
    }

    async function recupererSolde(id) {
        try {
            // Vérifiez bien que c'est votre URL active
            const API_URL = "https://lean3.onrender.com"; 
            const response = await fetch(${API_URL}/api/user/${id});
            const data = await response.json();

            if (data.success && data.user) {
                displaySolde.innerText = parseFloat(data.user.solde).toLocaleString('fr-FR');
            }
        } catch (err) {
            console.error("Erreur serveur solde:", err);
        }
    }
});
</script>
