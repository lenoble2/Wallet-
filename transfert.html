<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert - Lean</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .loading { display: none; color: orange; font-weight: bold; }
        .success-msg { display: none; color: green; background: #eaffea; padding: 10px; border-radius: 5px; }
        .error-msg { display: none; color: red; background: #ffeaea; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nouveau Transfert</h2>

        <div id="msg-succes" class="success-msg">✅ Reçu par le serveur ! Transfert en cours...</div>
        <div id="msg-erreur" class="error-msg">❌ Erreur de connexion au serveur.</div>

        <form id="transferForm">
            <label>ID du destinataire :</label>
            <input type="text" id="receiverId" placeholder="Ex: 2" required oninput="verifierNom()">
            <p id="nom-destinataire" style="font-size: 0.8em;"></p>

            <label>Montant (XOF) :</label>
            <input type="number" id="amount" placeholder="Montant" required>

            <label>Votre PIN :</label>
            <input type="password" id="pin" placeholder="****" required>

            <button type="submit" id="btn-envoyer">Confirmer l'envoi</button>
            <p id="status" class="loading">Envoi au serveur... ⏳</p>
        </form>
    </div>

    <script>
        // 1. Vérification automatique du nom
        async function verifierNom() {
            const id = document.getElementById('receiverId').value;
            const display = document.getElementById('nom-destinataire');
            if(id.length > 0) {
                try {
                    const res = await fetch(/api/verif-destinataire/${id});
                    const data = await res.json();
                    if(data.success) {
                        display.innerText = "Destinataire : " + data.nom;
                        display.style.color = "green";
                    } else {
                        display.innerText = "Utilisateur inconnu";
                        display.style.color = "red";
                    }
                } catch(e) { console.log("Serveur injoignable"); }
            }
        }

        // 2. Envoi du transfert avec preuve de réception
        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Afficher le message "Envoi au serveur"
            document.getElementById('status').style.display = 'block';
            document.getElementById('btn-envoyer').disabled = true;

            const payload = {
                senderId: localStorage.getItem('userId'), // Ton ID stocké à la connexion
                receiverId: document.getElementById('receiverId').value,
                amount: document.getElementById('amount').value,
                pin: document.getElementById('pin').value
            };

            try {
                const response = await fetch('/api/transfert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                document.getElementById('status').style.display = 'none';

                if (result.success) {
                    document.getElementById('msg-succes').style.display = 'block';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                } else {
                    alert("Refusé par le serveur : " + result.message);
                    document.getElementById('btn-envoyer').disabled = false;

}
            } catch (error) {
                document.getElementById('status').style.display = 'none';
                document.getElementById('msg-erreur').style.display = 'block';
                document.getElementById('btn-envoyer').disabled = false;
            }
        });
    </script>
</body>
</html>
