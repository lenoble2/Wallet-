<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert Sécurisé</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #message { margin-top: 20px; text-align: center; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
<div class="transfert-container">
    <h2>Nouveau Transfert</h2>
    
    <label>ID du destinataire :</label>
    <input type="number" id="receiverInput" placeholder="Ex: 3">
    
    <label>Montant (XOF) :</label>
    <input type="number" id="amountInput" placeholder="Ex: 2000">
    
    <label>Votre PIN :</label>
    <input type="password" id="pinInput" placeholder="****">
    
    <button type="button" onclick="executerTransfert()">Confirmer l'envoi</button>
    <p id="statusMessage"></p>
</div>

<script>
async function executerTransfert() {
    const receiverId = document.getElementById('receiverInput').value;
    const amount = document.getElementById('amountInput').value;
    const pin = document.getElementById('pinInput').value;
    const status = document.getElementById('statusMessage');

    // TEST DE RÉACTION DU BOUTON
    if (!receiverId  !amount  !pin) {
        alert("Veuillez remplir tous les champs !");
        return;
    }

    status.innerText = "Connexion au serveur...";
    status.style.color = "blue";

    try {
        const response = await fetch('https://lean3.onrender.com/api/transfert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                senderId: 1, // On simule que vous êtes l'ID 1 (Len)
                receiverId: receiverId,
                amount: amount,
                pin: pin
            })
        });

        const data = await response.json();

        if (response.ok) {
            alert("✅ " + data.message);
            status.innerText = data.message;
            status.style.color = "green";
        } else {
            alert("❌ Erreur : " + data.error);
            status.innerText = data.error;
            status.style.color = "red";
        }
    } catch (err) {
        alert("Impossible de joindre le serveur. Vérifiez votre connexion.");
        status.innerText = "Erreur de connexion.";
    }
}
</script>

</body>
</html>
