<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert Sécurisé</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #message { margin-top: 20px; text-align: center; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="transfer-container">
    <h2>Nouveau Transfert</h2>
    
    <label>ID du destinataire :</label>
    <input type="number" id="receiverId" placeholder="Ex: 3" required>
    
    <label>Montant (XOF) :</label>
    <input type="number" id="amount" placeholder="Entrez le montant" required>

    <label>Votre PIN :</label>
    <input type="password" id="senderPin" placeholder="****" maxlength="4" required>

    <button onclick="effectuerTransfert()">Confirmer l'envoi</button>
    
    <div id="message" style="margin-top: 10px;"></div>
</div>
<button onclick="validerTransfert()">Confirmer l'envoi</button>

<script>
function validerTransfert() {
    const receiverId = document.getElementById('id_destinataire').value; // Vérifie l'ID
    const amount = document.getElementById('montant').value;
    const pin = document.getElementById('pin').value;

    console.log("Envoi des données...", { receiverId, amount, pin });

    fetch('/api/transfert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senderId: 1, receiverId, amount, pin })
    })
    .then(res => res.json())
    .then(data => alert(data.message || data.error))
    .catch(err => console.error("Erreur fetch:", err));
}
</script>

</body>
</html>
