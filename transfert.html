<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:active { background-color: #0056b3; }
        .status { margin-top: 15px; font-size: 0.9em; color: #555; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Transfert de Fonds</h2>
        
        <label for="destinataire">ID du Destinataire :</label>
        <input type="text" id="destinataire" placeholder="Ex: 0800029">

        <label for="montant">Montant (XOF) :</label>
        <input type="number" id="montant" placeholder="Ex: 10000">

        <button onclick="effectuerTransfert()">Valider le transfert</button>
        
        <div id="debug" class="status">En attente d'action...</div>
    </div>

    <script>
        // Fonction principale
        async function effectuerTransfert() {
            const debugDiv = document.getElementById('debug');
            
            // 1. Mouchard visuel immédiat
            alert("Niveau 1 : Clic détecté !");
            debugDiv.innerText = "Traitement en cours...";

            try {
                // 2. Récupération des valeurs
                const receiverId = document.getElementById('destinataire').value;
                const montant = document.getElementById('montant').value;
                
                // On récupère l'ID de celui qui est connecté
                const senderId = localStorage.getItem('userId');

                // 3. Vérifications locales
                alert("Niveau 2 : Expéditeur (localStorage) = " + senderId);

                if (!senderId) {
                    alert("ERREUR : Vous n'êtes pas connecté (ID introuvable).");
                    debugDiv.innerText = "Erreur : Utilisateur non connecté.";
                    return;
                }

                if (!receiverId || !montant) {
                    alert("ERREUR : Veuillez remplir tous les champs.");
                    return;
                }

                // 4. Envoi vers le serveur Render
                alert("Niveau 3 : Envoi de la requête...");
                
                const response = await fetch('https://lean3.onrender.com/api/transfert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        senderId: senderId,
                        receiverId: receiverId,
                        montant: montant
                    })
                });

                // 5. Analyse de la réponse
                const data = await response.json();
                alert("Niveau 4 (Réponse Serveur) : " + JSON.stringify(data));

                if (data.success) {
                    alert("SUCCÈS ! Transfert effectué.");
                    debugDiv.style.color = "green";
                    debugDiv.innerText = "Transfert réussi !";
                } else {
                    alert("ÉCHEC : " + data.message);
                    debugDiv.style.color = "red";
                    debugDiv.innerText = "Erreur : " + data.message;
                }

            } catch (error) {
                // 6. Capture des erreurs réseau ou syntaxe
                alert("ERREUR CRITIQUE : " + error.message);
                debugDiv.innerText = "Erreur réseau ou serveur.";
            }
        }
    </script>
</body>
</html>
