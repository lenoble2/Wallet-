<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert Sécurisé</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #message { margin-top: 20px; text-align: center; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
<div class="transfert-container">
    <h2>Nouveau Transfert</h2>
    
    <label>ID du destinataire :</label>
    <input type="number" id="receiverInput" placeholder="Ex: 3">
    
    <label>Montant (XOF) :</label>
    <input type="number" id="amountInput" placeholder="Ex: 2000">
    
    <label>Votre PIN :</label>
    <input type="password" id="pinInput" placeholder="****">
    
    <button type="button" onclick="executerTransfert()">Confirmer l'envoi</button>
    <p id="statusMessage"></p>
</div>

<script>
async function confirmerEnvoi() {
    console.log("Bouton cliqué"); // Vérification 1

    // Récupération des éléments HTML
    const inputDest = document.getElementById('destinataire');
    const inputMontant = document.getElementById('montant');
    const inputPin = document.getElementById('pin');

    // Vérification si les éléments existent dans le HTML
    if (!inputDest || !inputMontant || !inputPin) {
        alert("Erreur technique : Un champ HTML est introuvable (ID mal écrit)");
        return;
    }

    const senderId = localStorage.getItem('userId');
    // On nettoie l'ID pour ne garder que le chiffre (ex: 080002 devient 2)
    const receiverId = inputDest.value.replace("08000", "").trim();
    const montant = inputMontant.value;
    const pin = inputPin.value;

    if (!senderId) {
        alert("Session expirée. Reconnectez-vous.");
        return;
    }

    try {
        console.log("Tentative d'envoi vers le serveur...");
        const response = await fetch('/api/transfert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                senderId: senderId,
                receiverId: receiverId,
                montant: montant,
                pin: pin
            })
        });

        console.log("Réponse reçue du serveur");
        const data = await response.json();
        
        // C'est ici que le message DOIT s'afficher
        alert(data.message || "Réponse reçue sans message");

        if (data.success) {
            window.location.href = "dashboard.html";
        }
    } catch (error) {
        console.error("Erreur Fetch:", error);
        alert("Impossible de joindre le serveur. Vérifiez votre connexion.");
    }
}

}
</script>

</body>
</html>
