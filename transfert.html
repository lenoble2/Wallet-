<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert Sécurisé</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #message { margin-top: 20px; text-align: center; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Nouveau Transfert</h2>
    
    <label for="dest">ID Destinataire :</label>
    <input type="text" id="dest" placeholder="Entrez le numéro (ex: 0800029)">

    <label for="montant">Montant (XOF) :</label>
    <input type="number" id="montant" placeholder="Somme à envoyer">

    <button onclick="executerTransfert()">Confirmer l'envoi</button>
    
    <div id="message"></div>
</div>

<script>
    async function executerTransfert() {
        const msgDiv = document.getElementById('message');
        const receiverId = document.getElementById('dest').value;
        const mt = document.getElementById('montant').value;
        
        // On récupère l'ID de l'expéditeur (ex: 08000) depuis la session/login
        const senderId = localStorage.getItem('userId'); 

        if (!senderId) {
            alert("Erreur : Session expirée. Reconnectez-vous.");
            return;
        }

        if (!receiverId || !mt) {
            alert("Merci de remplir tous les champs.");
            return;
        }

        // Préparation de l'affichage
        msgDiv.style.display = "block";
        msgDiv.innerText = "⏳ Traitement sécurisé en cours...";
        msgDiv.style.background = "#e8f0fe";
        msgDiv.style.color = "#1a73e8";

        try {
            // ATTENTION : Les noms des clés doivent correspondre à ton server.js
            const response = await fetch('https://lean3.onrender.com/api/transfert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    senderId: senderId,     // envoyé comme expediteur_id dans ton exemple
                    receiverId: receiverId, // envoyé comme email_destinataire
                    montant: mt 
                })
            });

            const data = await response.json();

            if (data.success) {
                msgDiv.innerText = "✅ " + data.message;
                msgDiv.style.background = "#e6fffa";
                msgDiv.style.color = "#2d3748";
                alert("Bravo ! Le transfert est validé.");
            } else {
                msgDiv.innerText = "❌ " + data.message;
                msgDiv.style.background = "#fff5f5";
                msgDiv.style.color = "#c53030";
            }
        } catch (error) {
            msgDiv.innerText = "❌ Erreur de connexion au serveur.";
            msgDiv.style.background = "#fff5f5";
            msgDiv.style.color = "#c53030";
        }
    }
</script>

</body>
</html>
