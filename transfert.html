<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Sécurisé - Lean</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .feedback { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; font-weight: bold; }
        .loading { background: #fff3cd; color: #856404; } /* Message orange : attente */
        .success { background: #d4edda; color: #155724; } /* Message vert : succès */
    </style>
</head>
<body>
    <div class="container">
        <h2>Effectuer un transfert</h2>
        
        <div id="status" class="feedback"></div>

        <form id="formTransfert">
            <input type="text" id="dest" placeholder="ID Destinataire (ex: 2)" required>
            <input type="number" id="montant" placeholder="Montant en XOF" required>
            <input type="password" id="monPin" placeholder="Votre PIN" required>
            <button type="submit" id="btnValider">Confirmer l'envoi</button>
        </form>
    </div>

    <script>
        document.getElementById('formTransfert').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnValider');

            // Étape 1 : Montrer que le clic est enregistré
            statusDiv.innerText = "⏳ Envoi au serveur en cours...";
            statusDiv.className = "feedback loading";
            statusDiv.style.display = "block";
            btn.disabled = true;

            const data = {
                dest: document.getElementById('dest').value,
                montant: document.getElementById('montant').value,
                pin: document.getElementById('monPin').value
            };

            try {
                const response = await fetch('/api/transfert', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                // Étape 2 : Le serveur a répondu
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerText = "✅ Message reçu ! Transfert validé par le serveur.";
                    statusDiv.className = "feedback success";
                } else {
                    statusDiv.innerText = "❌ Serveur : " + result.message;
                    statusDiv.className = "feedback error";
                    btn.disabled = false;
                }
            } catch (err) {
                statusDiv.innerText = "❌ ÉCHEC : Le serveur est éteint ou injoignable.";
                statusDiv.className = "feedback error";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
