<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Lean</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004080; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #003366; }
    </style>
</head>
<body>

<div class="box">
    <h2>Transfert de Fonds</h2>

    <label>ID Destinataire :</label>
    <input type="text" id="destId" placeholder="0800029">

    <label>Montant (XOF) :</label>
    <input type="number" id="montantInput" placeholder="Ex: 5000">

    <button onclick="valider()">Confirmer le transfert</button>
</div>
<script>
function effectuerTransfert() {
    alert("Le bouton a bien été cliqué !"); // Si cette alerte ne s'affiche pas, le problème est l'appel du bouton.

    try {
        const dest = document.getElementById('destinataire').value;
        const mt = document.getElementById('montant').value;
        const exp = localStorage.getItem('userId');

        if (!exp) {
            alert("Erreur : ID Expéditeur non trouvé. Reconnectez-vous.");
            return;
        }

        fetch('https://lean3.onrender.com/api/transfert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ senderId: exp, receiverId: dest, montant: mt })
        })
        .then(res => res.json())
        .then(data => alert("Réponse : " + data.message))
        .catch(err => alert("Erreur réseau : " + err));

    } catch (e) {
        alert("Erreur de code : " + e.message);
    }
}

}


</script>

</body>
</html>
