<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Lean</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004080; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #003366; }
    </style>
</head>
<body>

<div class="box">
    <h2>Transfert de Fonds</h2>

    <label>ID Destinataire :</label>
    <input type="text" id="destId" placeholder="0800029">

    <label>Montant (XOF) :</label>
    <input type="number" id="montantInput" placeholder="Ex: 5000">

    <button onclick="valider()">Confirmer le transfert</button>
</div>

<script>
    async function valider() {
        console.log("Bouton cliqué"); // Pour vérifier que la fonction se lance

        try {
            // 1. Récupération des éléments
            const destEl = document.getElementById('destId');
            const montEl = document.getElementById('montantInput');

            if (!destEl || !montEl) {
                alert("Erreur : Éléments HTML introuvables");
                return;
            }

            const destinataireID = destEl.value.trim();
            const montant = parseFloat(montantEl.value);
            
            // ID de test (à remplacer par la logique de session plus tard)
            const expediteurID = "0800001"; 

            // 2. Validation simple
            if (destinataireID === ""  isNaN(montant)  montant <= 0) {
                alert("Veuillez entrer un ID valide et un montant supérieur à 0.");
                return;
            }

            const payload = {
                senderId: expediteurID,
                receiverId: destinataireID,
                montant: montant
            };

            console.log("Envoi du payload:", payload);

            // 3. Envoi de la requête
            const resp = await fetch('https://lean3.onrender.com/api/transfert', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            // 4. Lecture de la réponse
            const res = await resp.json();
            console.log("Réponse reçue:", res);

            if (res.success) {
                alert("✅ Transfert réussi !");
                location.reload();
            } else {
                alert("❌ Erreur du serveur : " + (res.message || res.error));
            }

        } catch (err) {
            console.error("Erreur attrapée:", err);
            alert("Le serveur est injoignable ou une erreur est survenue.");
        }
    }
</script>


</body>
</html>
