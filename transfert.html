<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effectuer un transfert - Lean Wallet</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        .group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 15px; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Effectuer un transfert</h2>

<div class="group">
        <label>ID du destinataire</label>
        <input type="text" id="dest" placeholder="Ex: 80002">
    </div>       

    <div class="group">
        <label>Montant (XOF)</label>
        <input type="number" id="montant" placeholder="Somme à envoyer">
    </div>

    <div class="group" style="display:none;"> <label>Code PIN</label>
        <input type="password" id="pin" maxlength="4" value="0000">
    </div>

    <button id="btnEnvoyer">Envoyer l'argent</button>

    <div id="message"></div>
</div>

<script>
document.getElementById('btnEnvoyer').addEventListener('click', async () => {
    const messageDiv = document.getElementById('message');
    
    // 1. Récupérer les données
    // On s'assure que les IDs sont traités comme des chaînes pour le .replace()
    const rawExpediteur = localStorage.getItem('userId') || "";
    const rawDestinataire = document.getElementById('dest').value;
    const montantSaisi = document.getElementById('montant').value;

    // 2. Nettoyage (votre formule "clean")
    const cleanSenderId = rawExpediteur.toString().replace("08000", "");
    const cleanReceiverId = rawDestinataire.toString().replace("08000", "");

    // 3. Vérifications de base
    if (!cleanReceiverId || !montantSaisi) {
        messageDiv.style.color = "red";
        messageDiv.innerText = "Veuillez remplir le destinataire et le montant.";
        return;
    }

    if (!cleanSenderId) {
        messageDiv.style.color = "red";
        messageDiv.innerText = "Erreur : Session expirée. Reconnectez-vous.";
        return;
    }

    messageDiv.style.color = "blue";
    messageDiv.innerText = "Transfert en cours...";

    try {
        // 4. Appel de l'API de test_local.js
        const response = await fetch('/api/transfert-test', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                id_expediteur: cleanSenderId,
                id_destinataire: cleanReceiverId,
                montant: montantSaisi
            })
        });

        const result = await response.json();

        // 5. Affichage du résultat
        if (result.success) {
            messageDiv.style.color = "green";
            messageDiv.innerText = "✅ " + result.message;
            
            // Vider les champs après 2 secondes
            setTimeout(() => {
                document.getElementById('dest').value = '';
                document.getElementById('montant').value = '';
                messageDiv.innerText = "";
            }, 3000);
        } else {
            messageDiv.style.color = "red";
            messageDiv.innerText = "❌ " + result.message;
        }

} catch (error) {
        console.error("Erreur:", error);
        messageDiv.style.color = "red";
        messageDiv.innerText = "Erreur de connexion au serveur local.";
    }
});
</script>

</body>
</html>
