<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Transfert de Fonds</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; }
        .info { font-size: 0.9em; color: #666; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Effectuer un transfert</h2>
    <label>Email du destinataire :</label>
    <input type="email" id="destinataire" placeholder="ami@exemple.com">

    <label>Montant à envoyer (€) :</label>
    <input type="number" id="montant" placeholder="0.00" oninput="calculerFrais()">

    <div class="info">
        Frais de service (0.5%) : <span id="frais">0.00</span>€<br>
        <strong>Total débité : <span id="total">0.00</span>€</strong>
    </div>

    <button onclick="envoyerTransfert()">Confirmer le transfert</button>
</div>

<script>
    const TAUX = 0.005;

    function calculerFrais() {
        const montant = parseFloat(document.getElementById('montant').value) || 0;
        const frais = montant * TAUX;
        const total = montant; // Ici on considère que les 0.5% sont inclus dans le débit total

        document.getElementById('frais').innerText = frais.toFixed(2);
        document.getElementById('total').innerText = total.toFixed(2);
    }

    async function envoyerTransfert() {
        const data = {
            destinataire: document.getElementById('destinataire').value,
            montant: parseFloat(document.getElementById('montant').value),
            expediteurId: "user_123" // Simulé
        };

        const response = await fetch('/api/transfert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        if(result.success) {
            alert(Succès ! ${result.details.frais}€ de frais ont été envoyés à pourcent@lean.com);
        }
    }
</script>

</body>
</html>
