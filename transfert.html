<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Wallet - Transfert</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #eef2f3; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:active { background-color: #1e7e34; transform: scale(0.98); }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Effectuer un Transfert</h2>
    
    <label>Destinataire (ID/Numéro) :</label>
    <input type="text" id="destinataire" placeholder="Ex: 0800029">

    <label>Montant (XOF) :</label>
    <input type="number" id="montant" placeholder="Ex: 5000">

    <button onclick="validerTransfert()">Envoyer l'argent</button>
    
    <div id="status">Prêt</div>
</div>

<script>
    async function validerTransfert() {
        const statusDiv = document.getElementById('status');
        const receiverId = document.getElementById('destinataire').value;
        const montant = document.getElementById('montant').value;
        
        // On récupère l'ID (le numéro) stocké au login
        const senderId = localStorage.getItem('userId'); 

        if (!senderId) {
            alert("Erreur : Vous n'êtes pas identifié. Reconnectez-vous.");
            return;
        }

        if (!receiverId || !montant) {
            alert("Veuillez remplir tous les champs.");
            return;
        }

        statusDiv.innerText = "Transaction en cours...";
        statusDiv.style.color = "blue";

        try {
            const response = await fetch('https://lean3.onrender.com/api/transfert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ senderId, receiverId, montant })
            });

            const data = await response.json();

            if (data.success) {
                alert("SUCCÈS : " + data.message);
                statusDiv.innerText = "Transfert réussi !";
                statusDiv.style.color = "green";
            } else {
                alert("ÉCHEC : " + data.message);
                statusDiv.innerText = "Erreur : " + data.message;
                statusDiv.style.color = "red";
            }
        } catch (error) {
            alert("Erreur réseau : Impossible de joindre le serveur.");
            statusDiv.innerText = "Erreur de connexion.";
        }
    }
</script>

</body>
</html>
