<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfert Sécurisé - Lean</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .feedback { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; font-weight: bold; }
        .loading { background: #fff3cd; color: #856404; } /* Message orange : attente */
        .success { background: #d4edda; color: #155724; } /* Message vert : succès */
    </style>
</head>
<body>
    <div class="container">
        <h2>Effectuer un transfert</h2>

<div id="status" style="display:none; padding:10px; margin:10px; border-radius:5px;"></div>

<button id="btnConfirmer">Confirmer l'envoi</button>

<script>
document.getElementById('btnConfirmer').onclick = async () => {
    const status = document.getElementById('status');
    
    // 1. On montre que le clic fonctionne
    status.style.display = "block";
    status.style.backgroundColor = "#fff3cd"; // Orange
    status.innerText = "⏳ Envoi au serveur en cours...";

    try {
        const response = await fetch('/api/transfert', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                dest: document.getElementById('receiverId').value,
                montant: document.getElementById('amount').value,
                pin: document.getElementById('pin').value
            })
        });

        const data = await response.json();

        // 2. Le serveur a répondu !
        if (data.success) {
            status.style.backgroundColor = "#d4edda"; // Vert
            status.innerText = "✅ Succès : " + data.message;
        }
    } catch (err) {
        status.style.backgroundColor = "#f8d7da"; // Rouge
        status.innerText = "❌ Le serveur est injoignable.";
    }
};
</script>
</body>
</html>
