<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test de Transfert</title>
</head>
<body>
    <h2>Transférer des fonds</h2>
    <form action="transfert.php" method="POST">
        <label>ID de l'envoyeur :</label><br>
        <input type="number" name="id_source" required><br><br>

        <label>ID du destinataire :</label><br>
        <input type="number" name="id_dest" required><br><br>

        <label>Montant à envoyer :</label><br>
        <input type="number" step="0.01" name="montant" required><br><br>

        <button type="submit">Envoyer</button>
    </form>
</body>
</html>
