<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Lean</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --icon-bg: #eef2f8;
            --icon-color: #3b5998;
            --border-color: #f0f0f0;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .menu-container {
            width: 100%;
            max-width: 400px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            margin: 5px 0;
        }

        .menu-item {
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .menu-item:active {
            transform: scale(0.98);
            background-color: #f0f0f0;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background-color: var(--icon-bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .icon-box i {
            color: var(--icon-color);
            font-size: 18px;
        }

        .menu-text {
            flex-grow: 1;
            font-weight: 600;
            font-size: 15px;
        }

        .chevron {
            color: #ccc;
            font-size: 14px;
        }

        /* Style du bouton Déconnexion */
        .logout-btn {
            margin-top: 30px;
            border: 2px solid var(--danger-color) !important;
            color: var(--danger-color) !important;
            background: transparent !important;
            justify-content: center !important;
            cursor: pointer;
        }

        .logout-btn i {
            margin-right: 10px;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
        }

        .footer p {
            font-size: 12px;
            color: #888;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    
    <div class="menu-container">
        <header class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile" class="avatar">
            <h2 id="display-user-name" class="user-name">Utilisateur</h2>
        </header>

        <a href="verification.html" class="menu-item">
            <div class="icon-box"><i class="fas fa-id-card"></i></div>
            <div class="menu-text">Vérification d'identité</div>
            <div class="chevron"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a href="historique.html" class="menu-item">
            <div class="icon-box"><i class="fas fa-history"></i></div>
            <div class="menu-text">Historique</div>
            <div class="chevron"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a href="support.html" class="menu-item">
            <div class="icon-box"><i class="fas fa-headset"></i></div>
            <div class="menu-text">Contacter le service client</div>
            <div class="chevron"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a href="#" id="btn-deconnexion" class="menu-item logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <div class="menu-text">Déconnexion</div>
        </a>
    </div>

    <div class="footer">
        <p>© 2024 - 2026 Lean, v3.5.1</p>
        <p>Développé par LENOBLE STUDIO</p>
    </div>

<script>
    // 1. Afficher le nom de l'utilisateur au chargement
    const userName = localStorage.getItem('userName');
    if (userName) {
        document.getElementById('display-user-name').textContent = userName;
    }

    // 2. Logique de déconnexion complète
    document.getElementById('btn-deconnexion').addEventListener('click', function(e) {
        e.preventDefault(); 
        
        // Nettoyage de TOUTES les données de session
        localStorage.removeItem('userId');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userName');
        
        // On peut aussi utiliser localStorage.clear(); pour tout vider d'un coup
        
        console.log("Session fermée, redirection...");
        
        // Redirection vers la page de connexion
        window.location.href = "index.html";
    });
</script>

</body>
</html>
